services:
  postgres:
    image: postgres:16
    container_name: customer_ricky_morty_db
    environment:
      POSTGRES_DB: customer_ricky_morty
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d customer_ricky_morty"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: customer_ricky_morty_app
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/customer_ricky_morty
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
